<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OREO Game Hub</title>

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#3b82f6;
  --text:#fff;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',sans-serif;
  margin:0;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#020617;
  position:sticky;
  top:0;
  z-index:1000;
}

h1{color:var(--accent);margin:0;font-size:20px;}

.search{
  padding:8px;
  border-radius:6px;
  border:none;
}

.toggle{
  cursor:pointer;
  padding:8px 12px;
  background:var(--accent);
  border-radius:6px;
}

.section{padding:30px 20px;}

h2{
  border-bottom:2px solid #334155;
  display:inline-block;
  margin-bottom:20px;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:12px;
  padding:10px;
  transition:.3s;
  position:relative;
}

.card:hover{transform:scale(1.05);}

img{
  width:100%;
  border-radius:10px;
}

p{text-align:center;font-weight:bold;}

button{
  width:100%;
  padding:10px;
  background:var(--accent);
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.favorite{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
  font-size:18px;
}

.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#000;
}
</style>
</head>

<script>
function play(btn){
  const link = btn.nextElementSibling.href;
  window.open(link,'_blank');
}

function searchGame(){
  let input=document.querySelector('.search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card=>{
    let name=card.dataset.name;
    card.style.display=name.includes(input)?'block':'none';
  });
}

function toggleTheme(){
  document.body.classList.toggle('light');
}

function fav(el){
  el.textContent = el.textContent === '☆' ? '★' : '☆';
}
</script>
