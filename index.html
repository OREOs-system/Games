<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Index Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: #333;
            text-align: center;
            overflow: hidden;
        }
        header {
            padding: 20px;
            font-size: 2em;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .content {
            padding: 20px;
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }
        .content:hover {
            transform: scale(1.02);
        }
        footer {
            margin-top: 20px;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <header>🎮 Welcome to the Game Hub! 🎮</header>
    <div class="content">
        <p>Explore our collection of exciting games and enjoy smooth gameplay!</p>
        <p>🚀 Get ready to dive into the fun! 🌟</p>
    </div>
    <footer>
        <p>📅 Date: 2026-04-15</p>
    </footer>
</body>
</html>
