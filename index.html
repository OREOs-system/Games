        }

        img {
            width: 100%;
            aspect-ratio: 1/1;

            border-radius: 8px;
            margin-bottom: 10px;
        }

        p {
            margin: 15px 0;

        a {
            display: block;
            padding: 10px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        a:hover {
